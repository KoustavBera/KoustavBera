name: Update Daily Profile Meme

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch Meme via Imgflip API
        run: |
          python -c "
          import urllib.request
          import json
          import random

          USER_AGENT = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'

          def download_file(url, output_path):
              req = urllib.request.Request(url, headers={'User-Agent': USER_AGENT})
              with urllib.request.urlopen(req, timeout=15) as response, open(output_path, 'wb') as out_file:
                  out_file.write(response.read())

          api_url = 'https://api.imgflip.com/get_memes'

          try:
              req = urllib.request.Request(api_url, headers={'User-Agent': USER_AGENT})
              response = urllib.request.urlopen(req, timeout=15)
              data = json.loads(response.read().decode('utf-8'))
              
              if data.get('success'):
                  memes = data['data']['memes']
                  selected_meme = random.choice(memes)
                  meme_url = selected_meme['url']
                  
                  print(f'Successfully picked meme URL: {meme_url}')
                  download_file(meme_url, 'daily-meme.jpg')
                  print('Successfully downloaded meme asset!')
              else:
                  raise Exception('Imgflip API returned success=False')
                  
          except Exception as e:
              print(f'Fetch failed: {e}. Downloading fallback image.')
              fallback_url = 'https://picsum.photos/800/600'
              download_file(fallback_url, 'daily-meme.jpg')
          "

      - name: Commit and Push Image Asset
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily-meme.jpg
          git commit -m "docs: sync fresh daily meme asset" || exit 0
          git push
