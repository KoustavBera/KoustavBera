name: Update Daily Profile Meme

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch Fresh Meme File
        run: |
          python -c "
          import urllib.request
          import json
          import random

          try:
              # Fetch 100 popular meme templates from Imgflip's free public endpoint
              req = urllib.request.Request(
                  'https://api.imgflip.com/get_memes',
                  headers={'User-Agent': 'Mozilla/5.0'}
              )
              response = urllib.request.urlopen(req, timeout=15).read()
              data = json.loads(response)

              if data.get('success'):
                  memes = data['data']['memes']
                  # Pick a random meme from the top 100 templates
                  selected_meme = random.choice(memes)['url']
                  print(f'Successfully picked meme URL: {selected_meme}')
                  urllib.request.urlretrieve(selected_meme, 'daily-meme.jpg')
              else:
                  raise Exception('Imgflip API response missing success status')

          except Exception as e:
              print(f'Fetch failed: {e}. Downloading fallback image.')
              # Clean, direct fallback image
              urllib.request.urlretrieve(
                  'https://images.unsplash.com/photo-1531297122539-d31b0a140f3e',
                  'daily-meme.jpg'
              )
          "

      - name: Commit and Push Image Asset
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily-meme.jpg
          git commit -m "docs: sync fresh daily meme asset via Imgflip" || exit 0
          git push
